version: 2
project_name: diagrid-dev-dashboard

before:
  hooks:
    - go mod tidy
    - sh -c "cd web && npm ci && npm run build"

builds:
  - id: diagrid-dev-dashboard
    main: .
    binary: diagrid-dev-dashboard
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/diagridio/dev-dashboard/pkg/version.Version={{ .Version }}
      - -X github.com/diagridio/dev-dashboard/pkg/version.Commit={{ .Commit }}
      - -X github.com/diagridio/dev-dashboard/pkg/version.Date={{ .Date }}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers:
  - id: linux-amd64
    ids: [diagrid-dev-dashboard]
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/diagridio/dev-dashboard:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
  - id: linux-arm64
    ids: [diagrid-dev-dashboard]
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "ghcr.io/diagridio/dev-dashboard:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/diagridio/dev-dashboard:{{ .Version }}"
    image_templates:
      - "ghcr.io/diagridio/dev-dashboard:{{ .Version }}-amd64"
      - "ghcr.io/diagridio/dev-dashboard:{{ .Version }}-arm64"
  - name_template: "ghcr.io/diagridio/dev-dashboard:latest"
    # Prerelease tags (v1.5.0-rc.1) must not move :latest — consumers
    # (README example, Aspire hosting integration) resolve it by default.
    skip_push: auto
    image_templates:
      - "ghcr.io/diagridio/dev-dashboard:{{ .Version }}-amd64"
      - "ghcr.io/diagridio/dev-dashboard:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  github:
    owner: diagridio
    name: dev-dashboard   # GitHub REPO name — not the binary
  draft: false
  prerelease: auto

changelog:
  use: github
